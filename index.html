<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTV Market Terminal</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <svg class="global-defs" aria-hidden="true" focusable="false">
        <defs>
            <linearGradient id="brandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FF2E50"/>
                <stop offset="100%" stop-color="#A60011"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="app-header" id="globalHeader">
        <h1>Markets</h1>
        <div class="user-avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" class="icon-stroke"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </div>

    <div class="workspace" id="mainWorkspace">
        <div id="view-dashboard" class="view-module is-active">
            <div class="welcome-header">Welcome back, <span>Market Overview</span></div>
            
            <div class="asset-card"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>{"symbol": "OANDA:XAUUSD", "width": "100%", "height": "100%", "locale": "en", "dateRange": "1M", "colorTheme": "dark", "trendLineColor": "#F5B726", "isTransparent": true, "autosize": true}</script></div><div class="mask-overlay mask-dash"></div></div>
            <div class="asset-card"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>{"symbol": "CAPITALCOM:DXY", "width": "100%", "height": "100%", "locale": "en", "dateRange": "1M", "colorTheme": "dark", "trendLineColor": "#0E85FF", "isTransparent": true, "autosize": true}</script></div><div class="mask-overlay mask-dash"></div></div>
            <div class="asset-card"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>{"symbol": "CAPITALCOM:US500", "width": "100%", "height": "100%", "locale": "en", "dateRange": "1M", "colorTheme": "dark", "trendLineColor": "#00C873", "isTransparent": true, "autosize": true}</script></div><div class="mask-overlay mask-dash"></div></div>
            <div class="asset-card"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>{"symbol": "BINANCE:BTCUSDT", "width": "100%", "height": "100%", "locale": "en", "dateRange": "1M", "colorTheme": "dark", "trendLineColor": "#F7931A", "isTransparent": true, "autosize": true}</script></div><div class="mask-overlay mask-dash"></div></div>
        </div>

        <div id="view-terminal" class="view-module">
            <div class="wb-chart-header">
                <div class="wb-header-left">
                    <div class="wb-asset-info"><h2>XAUUSD</h2></div>
                </div>
            </div>
            <div class="wb-chart-container">
                <div id="tf-dropdown" class="tf-menu">
                    <div class="tf-grid">
                        <div class="tf-option" onclick="applyTimeframe('1', '1M', this)">1m</div>
                        <div class="tf-option" onclick="applyTimeframe('15', '15M', this)">15m</div>
                        <div class="tf-option" onclick="applyTimeframe('60', '1H', this)">1H</div>
                        <div class="tf-option is-active" onclick="applyTimeframe('D', 'Daily', this)">Daily</div>
                    </div>
                </div>
                <div id="dynamic-chart-wrapper" style="height:100%;width:100%;"></div>
            </div>
            <div class="wb-chart-toolbar">
                <div class="wb-tool-item is-selected" onclick="toggleTimeframeMenu()"><span id="current-tf-label">Daily</span></div>
                <div class="wb-tool-item" onclick="updateChartSetting('style', null, this)">Style</div>
                <div class="wb-tool-item" onclick="updateChartSetting('draw', null, this)">Tools</div>
            </div>
        </div>

        <div id="view-news" class="view-module"><div class="asset-card" style="height: 100%; border: none;"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>{"feedMode": "all_symbols", "isTransparent": true, "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"}</script></div></div></div>
        <div id="view-menu" class="view-module"><ul class="settings-menu"></ul></div>
    </div>

    <div class="primary-nav">
        <button class="nav-action is-active" onclick="routeTo('view-dashboard', 'Markets', this)">Home</button>
        <button class="nav-action" onclick="routeTo('view-terminal', 'Terminal', this)">Chart</button>
        <button class="nav-action" onclick="routeTo('view-news', 'News', this)">News</button>
        <button class="nav-action" onclick="routeTo('view-menu', 'Menu', this)">Menu</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
